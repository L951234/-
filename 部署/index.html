<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>英语词汇学习 - CET-4/CET-6</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.2.1/dist/transformers.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/kokoro-js@1.2.1/dist/kokoro.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="header-content">
                <h1 class="app-title">VocabMaster</h1>
                <p class="app-subtitle">CET-4 / CET-6</p>
            </div>
        </header>

        <nav class="tabs">
            <button class="tab-btn active" data-tab="cet4">CET-4</button>
            <button class="tab-btn" data-tab="cet6">CET-6</button>
        </nav>

        <div class="search-bar">
            <div class="search-input-wrapper">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" class="search-input" id="searchInput" placeholder="输入单词前缀搜索...">
                <button class="search-clear" id="searchClear" style="display:none;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
        </div>

        <main class="main-content" id="mainContent">
            <div class="loading-overlay" id="loadingOverlay">
                <div class="spinner"></div>
                <p class="loading-text">加载中...</p>
            </div>

            <div class="error-message" id="errorMessage"></div>

            <div class="alphabet-nav" id="alphabetNav"></div>

            <div class="word-list" id="wordList"></div>
        </main>

        <button class="back-to-top" id="backToTop">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="18 15 12 9 6 15"></polyline>
            </svg>
        </button>

        <div class="practice-panel" id="practicePanel">
            <div class="panel-header">
                <span class="selected-count" id="selectedCount">已选 0 词</span>
                <button class="clear-btn" id="clearBtn">清空</button>
            </div>

            <div class="mode-selector">
                <button class="mode-btn active" data-mode="english">纯英文</button>
                <button class="mode-btn" data-mode="en-zh">英文+中文</button>
                <button class="mode-btn" data-mode="full">英文+中文+拼写</button>
            </div>

            <div class="controls">
                <select class="voice-select" id="voiceSelect">
                    <option value="">选择语音</option>
                </select>

                <div class="speed-control">
                    <span class="speed-label">语速</span>
                    <input type="range" id="speedRange" min="1" max="5" value="3" step="1">
                    <span class="speed-value" id="speedValue">中</span>
                </div>
            </div>

            <div class="playback-controls">
                <button class="play-btn" id="playBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="5 3 19 12 5 21 5 3"></polygon>
                    </svg>
                </button>
                <button class="pause-btn" id="pauseBtn" disabled>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="6" y="4" width="4" height="16"></rect>
                        <rect x="14" y="4" width="4" height="16"></rect>
                    </svg>
                </button>
                <button class="stop-btn" id="stopBtn" disabled>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    </svg>
                </button>
                <button class="repeat-btn" id="repeatBtn">
                    <span class="repeat-text">×1</span>
                </button>
            </div>

            <div class="current-word" id="currentWord">
                <p class="word-text" id="currentWordText"></p>
                <p class="word-phonetic" id="currentWordPhonetic"></p>
            </div>
        </div>

        <div class="selected-modal" id="selectedModal">
            <div class="modal-overlay" id="modalOverlay"></div>
            <div class="modal-content">
                <div class="modal-header">
                    <h3 class="modal-title">已选单词</h3>
                    <button class="modal-close" id="modalClose">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="selected-list" id="selectedList"></div>
                    <div class="empty-state" id="emptyState" style="display:none;">
                        <p>还没有选择单词</p>
                    </div>
                </div>
            </div>
        </div>

        <footer class="footer">
            <p>© 2024 VocabMaster</p>
        </footer>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
